name: Mobile - Release Candidate

# Publishes the development channel for every merge to development.
# Native fingerprint unchanged -> EAS Update on the development channel.
# Native fingerprint changed   -> local APK build plus GitHub prereleases:
#   - mobile-rc-v<version>-<sha>  durable GitHub prerelease
#   - mobile-rc-latest            rolling GitHub prerelease pointer
#
# Concurrency: cancel-in-progress:false. Canceling an EAS local build while it
# is talking to remote versionCode state can corrupt the queued version state,
# so queued builds always run to completion.
#
# Secrets: EXPO_TOKEN, GITHUB_TOKEN (automatic).
# Required secret: VEX_ANDROID_GOOGLE_SERVICES_DEV_JSON_BASE64.
# Fallback raw JSON secret: VEX_ANDROID_GOOGLE_SERVICES_DEV_JSON.

on:
    push:
        branches: [development]
    workflow_dispatch:

concurrency:
    group: mobile-release-candidate
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    release-candidate:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Prepare development Firebase config
              working-directory: apps/mobile
              env:
                  GOOGLE_SERVICES_JSON: ${{ secrets.VEX_ANDROID_GOOGLE_SERVICES_DEV_JSON }}
                  GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.VEX_ANDROID_GOOGLE_SERVICES_DEV_JSON_BASE64 }}
              run: |
                  if [ -n "${GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
                    printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > google-services.dev.json
                  elif [ -n "${GOOGLE_SERVICES_JSON:-}" ]; then
                    printf '%s' "$GOOGLE_SERVICES_JSON" > google-services.dev.json
                  else
                    echo "::error::Missing VEX_ANDROID_GOOGLE_SERVICES_DEV_JSON_BASE64. Add it from apps/mobile/google-services.dev.json so CI can reproduce the local dev build."
                    exit 1
                  fi

                  node -e '
                    const fs = require("node:fs");
                    const path = "google-services.dev.json";
                    const expected = "chat.vex.mobile.dev";
                    const data = JSON.parse(fs.readFileSync(path, "utf8"));
                    const packages = (data.client ?? [])
                      .map((client) => client.client_info?.android_client_info?.package_name)
                      .filter(Boolean);
                    if (!packages.includes(expected)) {
                      console.error(`${path} does not contain Android package ${expected}`);
                      console.error(`Found package(s): ${packages.join(", ") || "(none)"}`);
                      process.exit(1);
                    }
                  '
                  echo "VEX_ANDROID_GOOGLE_SERVICES_FILE=./google-services.dev.json" >> "$GITHUB_ENV"

            - name: Compute current fingerprint
              id: fp
              working-directory: apps/mobile
              env:
                  EAS_BUILD_PROFILE: development
                  VEX_APP_ENV: development
                  VEX_ENABLE_DEV_BUILD: "1"
              run: |
                  npx @expo/fingerprint@latest . > /tmp/current-fingerprint.json
                  HASH=$(node -pe "require('/tmp/current-fingerprint.json').hash")
                  echo "hash=$HASH" >> "$GITHUB_OUTPUT"
                  echo "Current fingerprint hash: $HASH"

            - name: Download previous fingerprint asset
              id: prev_fp
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if gh release download mobile-rc-latest \
                        --pattern 'fingerprint.json' \
                        --output /tmp/prev-fingerprint.json 2>/dev/null; then
                    PREV_HASH=$(node -pe "require('/tmp/prev-fingerprint.json').hash")
                    echo "hash=$PREV_HASH" >> "$GITHUB_OUTPUT"
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "Previous fingerprint hash: $PREV_HASH"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                    echo "No previous fingerprint asset; will build"
                  fi

            - name: Decide path
              id: decide
              run: |
                  if [ "${{ steps.prev_fp.outputs.exists }}" = "true" ] && \
                     [ "${{ steps.fp.outputs.hash }}" = "${{ steps.prev_fp.outputs.hash }}" ]; then
                    PATH_DECISION=ota
                  else
                    PATH_DECISION=build
                  fi
                  echo "path=$PATH_DECISION" >> "$GITHUB_OUTPUT"
                  echo "Decision: $PATH_DECISION"

            - name: Install EAS CLI (OTA path)
              if: steps.decide.outputs.path == 'ota'
              run: npm install -g eas-cli@latest

            - name: Push OTA update
              if: steps.decide.outputs.path == 'ota'
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
                  EAS_BUILD_PROFILE: development
                  EXPO_PUBLIC_ENABLE_DEV_SERVER: "1"
                  EXPO_PUBLIC_SERVER_URL: dev.vex.wtf
                  EXPO_PUBLIC_VEX_COMMIT_SHA: ${{ github.sha }}
                  VEX_APP_ENV: development
                  VEX_ENABLE_DEV_BUILD: "1"
              run: |
                  export EXPO_PUBLIC_VEX_APP_VERSION="$(node -pe "require('./package.json').version")"
                  eas update \
                    --channel development \
                    --message "development ${GITHUB_SHA::8}" \
                    --environment development \
                    --non-interactive

            - name: Setup Java (Temurin 17)
              if: steps.decide.outputs.path == 'build'
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Setup Android SDK
              if: steps.decide.outputs.path == 'build'
              uses: android-actions/setup-android@v4
              with:
                  cmdline-tools-version: "13114758"

            - name: Cache Gradle
              if: steps.decide.outputs.path == 'build'
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json', 'apps/mobile/app.config.js', 'apps/mobile/eas.json', 'apps/mobile/plugins/**') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-

            - name: Install EAS CLI + local build plugin
              if: steps.decide.outputs.path == 'build'
              run: npm install -g eas-cli@latest eas-cli-local-build-plugin@latest

            - name: Build development APK (local)
              if: steps.decide.outputs.path == 'build'
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
                  EAS_BUILD_PROFILE: development
                  EXPO_PUBLIC_ENABLE_DEV_SERVER: "1"
                  EXPO_PUBLIC_SERVER_URL: dev.vex.wtf
                  EXPO_PUBLIC_VEX_COMMIT_SHA: ${{ github.sha }}
                  VEX_APP_ENV: development
                  VEX_ENABLE_DEV_BUILD: "1"
              run: |
                  export EXPO_PUBLIC_VEX_APP_VERSION="$(node -pe "require('./package.json').version")"
                  eas build \
                    --profile development \
                    --platform android \
                    --local \
                    --non-interactive \
                    --output "${{ github.workspace }}/vex-development.apk"

            - name: Read release candidate metadata
              if: steps.decide.outputs.path == 'build'
              id: meta
              run: |
                  VERSION=$(node -pe "require('./apps/mobile/package.json').version")
                  SHORT_SHA=${GITHUB_SHA::8}
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
                  echo "tag=mobile-rc-v${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
                  echo "asset=vex-development-${VERSION}-${SHORT_SHA}.apk" >> "$GITHUB_OUTPUT"

            - name: Build release candidate notes
              if: steps.decide.outputs.path == 'build'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  PR=$(gh pr list \
                    --search "${{ github.sha }}" \
                    --state merged \
                    --base development \
                    --limit 1 \
                    --json number,title,author \
                    -q '.[0] // empty')

                  {
                    echo "## Release candidate"
                    echo ""
                    echo "Vex Development APK built from commit ${{ steps.meta.outputs.short_sha }}."
                    echo ""
                    echo "- Package id: \`chat.vex.mobile.dev\`"
                    echo "- Branch: \`development\`"
                    echo "- Commit: \`${{ github.sha }}\`"
                    if [ -n "$PR" ]; then
                      NUMBER=$(jq -r '.number' <<< "$PR")
                      TITLE=$(jq -r '.title' <<< "$PR")
                      AUTHOR=$(jq -r '.author.login' <<< "$PR")
                      echo "- Merged PR: #${NUMBER} ${TITLE} by @${AUTHOR}"
                    else
                      echo "- Source: direct push or merge commit"
                    fi
                  } > /tmp/mobile-rc-notes.md

                  cat /tmp/mobile-rc-notes.md

            - name: Create durable release candidate
              if: steps.decide.outputs.path == 'build'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  cp vex-development.apk "${{ steps.meta.outputs.asset }}"
                  cp /tmp/current-fingerprint.json fingerprint.json
                  TAG="${{ steps.meta.outputs.tag }}"
                  TITLE="Vex Development ${{ steps.meta.outputs.version }} RC (${{ steps.meta.outputs.short_sha }})"

                  if gh release view "$TAG" >/dev/null 2>&1; then
                    gh release upload "$TAG" fingerprint.json --clobber
                    gh release upload "$TAG" "${{ steps.meta.outputs.asset }}" --clobber
                    gh release edit "$TAG" \
                      --target "$GITHUB_SHA" \
                      --title "$TITLE" \
                      --notes-file /tmp/mobile-rc-notes.md \
                      --prerelease
                  else
                    gh release create "$TAG" "${{ steps.meta.outputs.asset }}" \
                      fingerprint.json \
                      --target "$GITHUB_SHA" \
                      --prerelease \
                      --title "$TITLE" \
                      --notes-file /tmp/mobile-rc-notes.md
                  fi

            - name: Update rolling release candidate pointer
              if: steps.decide.outputs.path == 'build'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="mobile-rc-latest"
                  TITLE="Vex Development RC (latest)"
                  gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
                  gh release create "$TAG" "${{ steps.meta.outputs.asset }}" fingerprint.json \
                    --target "$GITHUB_SHA" \
                    --prerelease \
                    --title "$TITLE" \
                    --notes-file /tmp/mobile-rc-notes.md
