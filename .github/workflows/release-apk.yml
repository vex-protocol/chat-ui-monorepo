name: Release APK

# Builds the production APK and creates a GitHub Release when the release-
# mobile PR (maintained by release-pr.yml) is merged to master. Trigger is
# a version change in apps/mobile/package.json on master — the merged PR's
# body is extracted and used as the release notes.
#
# The release APK has updates.enabled:false baked into app.config.js, so
# it never contacts any update server. Installing it is a one-time,
# pinned binary.
#
# Secrets: EXPO_TOKEN (EAS auth), GITHUB_TOKEN (automatic).

on:
    push:
        branches: [master]
        paths:
            - "apps/mobile/package.json"

concurrency:
    group: release-apk
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 2

            - name: Detect version change
              id: version
              run: |
                  NEW=$(node -pe "require('./apps/mobile/package.json').version")
                  git show HEAD~1:apps/mobile/package.json > /tmp/old-package.json 2>/dev/null || echo '{"version":""}' > /tmp/old-package.json
                  OLD=$(node -pe "require('/tmp/old-package.json').version || ''")
                  if [ "$OLD" = "$NEW" ]; then
                    echo "No version change ($OLD → $NEW), skipping release"
                    echo "skip=true" >> $GITHUB_OUTPUT
                  else
                    echo "Version change: $OLD → $NEW"
                    echo "version=$NEW" >> $GITHUB_OUTPUT
                    echo "skip=false" >> $GITHUB_OUTPUT
                  fi

            - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0
              if: steps.version.outputs.skip == 'false'

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              if: steps.version.outputs.skip == 'false'
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - name: Install dependencies
              if: steps.version.outputs.skip == 'false'
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Build production APK via EAS cloud
              if: steps.version.outputs.skip == 'false'
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
              run: |
                  pnpm dlx eas-cli@latest build \
                    --profile production \
                    --platform android \
                    --non-interactive \
                    --json > /tmp/eas-build.json
                  BUILD_URL=$(node -pe "require('/tmp/eas-build.json')[0].artifacts.buildUrl")
                  echo "Downloading APK from $BUILD_URL"
                  curl -fsSL "$BUILD_URL" -o "${{ github.workspace }}/release.apk"

            - name: Extract release notes from release PR body
              if: steps.version.outputs.skip == 'false'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  PR=$(gh pr list \
                    --search "${{ github.sha }}" \
                    --state merged \
                    --limit 1 \
                    --json number \
                    -q '.[0].number // empty')

                  if [ -n "$PR" ]; then
                    echo "Found merged PR #$PR"
                    gh pr view "$PR" --json body -q .body > /tmp/release-notes.md
                  else
                    echo "No PR found for ${{ github.sha }} — using git log as fallback"
                    PREV_TAG=$(git describe --tags --match='mobile-v*' --abbrev=0 HEAD~1 2>/dev/null || echo '')
                    {
                      echo "## What's new"
                      echo ""
                      if [ -n "$PREV_TAG" ]; then
                        git log "$PREV_TAG"..HEAD --format='- %s'
                      else
                        git log --format='- %s' -20
                      fi
                    } > /tmp/release-notes.md
                  fi

                  echo "--- release notes ---"
                  cat /tmp/release-notes.md

            - name: Create GitHub Release
              if: steps.version.outputs.skip == 'false'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "mobile-v${{ steps.version.outputs.version }}" \
                    release.apk \
                    --latest \
                    --title "Mobile ${{ steps.version.outputs.version }}" \
                    --notes-file /tmp/release-notes.md
