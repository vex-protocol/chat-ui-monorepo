name: Dev APK

# Maintains the continuously-updated dev APK. On every push to master:
#
#   fingerprint unchanged → eas update (OTA push only, ~30s)
#   fingerprint changed   → eas build + two GitHub prereleases:
#                             - mobile-dev-v<version>-<sha>  (durable)
#                             - mobile-dev-latest             (rolling)
#
# The dev APK has updates.enabled:true + runtimeVersion:fingerprint in
# app.config.js, so installed dev APKs receive OTAs automatically until
# the fingerprint boundary is crossed.
#
# Fingerprint is stored in the mobile-dev-latest release body as an HTML
# comment: <!-- fingerprint: <hash> -->
#
# Secrets: EXPO_TOKEN, GITHUB_TOKEN (automatic).

on:
    push:
        branches: [master]
    workflow_dispatch:

concurrency:
    group: dev-apk
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    dev-apk:
        if: >-
            github.actor != 'github-actions[bot]' ||
            github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Compute current fingerprint
              id: fp
              working-directory: apps/mobile
              run: |
                  NEW_FP=$(pnpm dlx @expo/fingerprint@latest . --platforms android 2>/dev/null | node -pe "JSON.parse(require('fs').readFileSync(0, 'utf8')).hash")
                  echo "new=$NEW_FP" >> $GITHUB_OUTPUT
                  echo "Current fingerprint: $NEW_FP"

            - name: Read previous fingerprint from rolling release
              id: prev_fp
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  BODY=$(gh release view mobile-dev-latest --json body -q .body 2>/dev/null || echo '')
                  PREV_FP=$(echo "$BODY" | grep -oE '<!-- fingerprint: [a-f0-9]+ -->' | grep -oE '[a-f0-9]{8,}' || echo '')
                  echo "prev=$PREV_FP" >> $GITHUB_OUTPUT
                  if [ -n "$PREV_FP" ]; then
                    echo "Previous fingerprint: $PREV_FP"
                  else
                    echo "No previous fingerprint found — will build"
                  fi

            - name: Decide path
              id: decide
              run: |
                  if [ "${{ steps.fp.outputs.new }}" = "${{ steps.prev_fp.outputs.prev }}" ] && [ -n "${{ steps.prev_fp.outputs.prev }}" ]; then
                    echo "path=ota" >> $GITHUB_OUTPUT
                    echo "Fingerprint unchanged → OTA update path"
                  else
                    echo "path=build" >> $GITHUB_OUTPUT
                    echo "Fingerprint changed → rebuild path"
                  fi

            # ── OTA path ──────────────────────────────────────────────

            - name: Push OTA update
              if: steps.decide.outputs.path == 'ota'
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
                  EAS_BUILD_PROFILE: development
              run: |
                  pnpm dlx eas-cli@latest update \
                    --branch development \
                    --message "main ${GITHUB_SHA::8}" \
                    --non-interactive

            # ── Build path ────────────────────────────────────────────

            - name: Build dev APK via EAS cloud
              if: steps.decide.outputs.path == 'build'
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
                  EAS_BUILD_PROFILE: development
              run: |
                  pnpm dlx eas-cli@latest build \
                    --profile development \
                    --platform android \
                    --non-interactive \
                    --json > /tmp/eas-build.json
                  BUILD_URL=$(node -pe "require('/tmp/eas-build.json')[0].artifacts.buildUrl")
                  echo "Downloading dev APK from $BUILD_URL"
                  curl -fsSL "$BUILD_URL" -o "${{ github.workspace }}/dev.apk"

            - name: Read mobile version
              if: steps.decide.outputs.path == 'build'
              id: version
              run: |
                  VERSION=$(node -pe "require('./apps/mobile/package.json').version")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Create durable prerelease
              if: steps.decide.outputs.path == 'build'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  SHORT_SHA=${GITHUB_SHA::8}
                  TAG="mobile-dev-v${{ steps.version.outputs.version }}-${SHORT_SHA}"
                  NOTES=$(cat <<EOF
                  <!-- fingerprint: ${{ steps.fp.outputs.new }} -->

                  Vex Dev APK built from commit ${SHORT_SHA}. Installs with package id \`chat.vex.mobile.dev\` so it coexists with the release APK. Receives OTAs until the native fingerprint changes.
                  EOF
                  )
                  gh release create "$TAG" dev.apk \
                    --prerelease \
                    --title "Mobile Dev ${{ steps.version.outputs.version }} (${SHORT_SHA})" \
                    --notes "$NOTES"

            - name: Update rolling mobile-dev-latest pointer
              if: steps.decide.outputs.path == 'build'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  SHORT_SHA=${GITHUB_SHA::8}
                  NOTES=$(cat <<EOF
                  <!-- fingerprint: ${{ steps.fp.outputs.new }} -->

                  **Always-current Vex Dev APK** (commit ${SHORT_SHA}).

                  This release is rebuilt every time the native fingerprint changes. Install once from this page and you'll receive OTAs on every JS-only merge to master until the next fingerprint boundary.

                  Download: \`gh release download mobile-dev-latest --pattern '*.apk' -R \${{ github.repository }}\`
                  EOF
                  )
                  gh release delete mobile-dev-latest --cleanup-tag --yes 2>/dev/null || true
                  gh release create mobile-dev-latest dev.apk \
                    --prerelease \
                    --target "$GITHUB_SHA" \
                    --title "Mobile Dev (latest)" \
                    --notes "$NOTES"
