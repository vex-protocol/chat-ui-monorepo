name: Mobile - Release

# Builds the production APK and creates a GitHub Release for every merge to
# master. The release version is derived from mobile-v* tags:
#
#   - if HEAD already has a mobile-v* tag, reruns reuse that version
#   - otherwise, use apps/mobile/package.json when it has advanced beyond the
#     latest mobile-v* tag, or bump patch from the latest mobile-v* tag
#   - on a first release, use apps/mobile/package.json's version
#
# The calculated version is passed to app.config.js via VEX_APP_VERSION so the
# APK's visible version matches the GitHub Release without requiring the
# workflow to push a version commit directly to protected master.
#
# Concurrency: cancel-in-progress:false. Canceling an EAS local build while it
# is talking to remote versionCode state can corrupt the queued version state,
# so queued builds always run to completion.
#
# Secrets: EXPO_TOKEN, GITHUB_TOKEN (automatic).

on:
    push:
        branches: [master]
    workflow_dispatch:

concurrency:
    group: release-mobile
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - name: Resolve release version
              id: version
              run: |
                  git fetch --force --tags
                  PACKAGE_VERSION=$(node -pe "require('./apps/mobile/package.json').version")
                  HEAD_TAG=$(git tag --points-at HEAD --list 'mobile-v*' | sort -V | tail -n 1)
                  if [ -n "$HEAD_TAG" ]; then
                    VERSION="${HEAD_TAG#mobile-v}"
                    PREV_TAG=$(git describe --tags --match='mobile-v*' --abbrev=0 HEAD^ 2>/dev/null || echo '')
                    echo "Reusing version from existing HEAD tag: $HEAD_TAG"
                  else
                    PREV_TAG=$(git describe --tags --match='mobile-v*' --abbrev=0 2>/dev/null || echo '')
                    if [ -n "$PREV_TAG" ]; then
                      BASE_VERSION="${PREV_TAG#mobile-v}"
                      VERSION=$(BASE_VERSION="$BASE_VERSION" PACKAGE_VERSION="$PACKAGE_VERSION" node -e '
                        const base = process.env.BASE_VERSION;
                        const pkg = process.env.PACKAGE_VERSION;
                        const parse = (value, label) => {
                          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(value ?? "");
                          if (!match) {
                            console.error(`Invalid ${label} version: ${value}`);
                            process.exit(1);
                          }
                          return match.slice(1).map(Number);
                        };
                        const compare = (left, right) => {
                          for (let i = 0; i < 3; i += 1) {
                            if (left[i] !== right[i]) return left[i] - right[i];
                          }
                          return 0;
                        };
                        const baseParts = parse(base, "mobile release base");
                        const pkgParts = parse(pkg, "mobile package");
                        if (compare(pkgParts, baseParts) > 0) {
                          console.log(pkg);
                          process.exit(0);
                        }
                        const [major, minor, patch] = baseParts;
                        console.log(`${major}.${minor}.${Number(patch) + 1}`);
                      ')
                      echo "Resolved next version from latest tag ${BASE_VERSION} and package ${PACKAGE_VERSION}: ${VERSION}"
                    else
                      VERSION="$PACKAGE_VERSION"
                      echo "Resolved first version from package.json: ${VERSION}"
                    fi
                  fi

                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=mobile-v$VERSION" >> "$GITHUB_OUTPUT"
                  echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
                  echo "asset=vex-${VERSION}.apk" >> "$GITHUB_OUTPUT"

            - name: Setup Java (Temurin 17)
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Setup Android SDK
              uses: android-actions/setup-android@v4
              with:
                  cmdline-tools-version: "13114758"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Install EAS CLI + local build plugin
              run: npm install -g eas-cli@latest eas-cli-local-build-plugin@latest

            - name: Build production APK (local)
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
                  EAS_BUILD_PROFILE: production
                  EXPO_PUBLIC_ENABLE_DEV_SERVER: "0"
                  EXPO_PUBLIC_SERVER_URL: api.vex.wtf
                  VEX_ANDROID_GOOGLE_SERVICES_FILE: ./google-services.prod.json
                  VEX_APP_DISPLAY_NAME: Vex Beta
                  VEX_APP_VERSION: ${{ steps.version.outputs.version }}
                  VEX_ENABLE_DEV_BUILD: "0"
              run: |
                  eas build \
                    --profile production \
                    --platform android \
                    --local \
                    --non-interactive \
                    --output "${{ github.workspace }}/release.apk"

            - name: Build release notes
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PREV_TAG: ${{ steps.version.outputs.previous_tag }}
              run: |
                  PR=$(gh pr list \
                    --search "${{ github.sha }}" \
                    --state merged \
                    --base master \
                    --limit 1 \
                    --json number,title,author,body \
                    -q '.[0] // empty')

                  if [ -n "$PR" ]; then
                    NUMBER=$(jq -r '.number' <<< "$PR")
                    TITLE=$(jq -r '.title' <<< "$PR")
                    AUTHOR=$(jq -r '.author.login' <<< "$PR")
                    BODY=$(jq -r '.body // ""' <<< "$PR")
                    {
                      echo "## What's new"
                      echo ""
                      echo "Released from #${NUMBER} ${TITLE} by @${AUTHOR}."
                      if [ -n "$BODY" ]; then
                        echo ""
                        echo "$BODY"
                      fi
                    } > /tmp/release-notes.md
                  else
                    {
                      echo "## What's new"
                      echo ""
                      if [ -n "$PREV_TAG" ]; then
                        git log "$PREV_TAG"..HEAD --format='- %s'
                      else
                        git log --format='- %s' -20
                      fi
                    } > /tmp/release-notes.md
                  fi

                  echo "--- release notes ---"
                  cat /tmp/release-notes.md

            - name: Create or update GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ steps.version.outputs.tag }}"
                  TITLE="Vex ${{ steps.version.outputs.version }}"
                  ASSET="${{ steps.version.outputs.asset }}"
                  cp release.apk "$ASSET"

                  if gh release view "$TAG" >/dev/null 2>&1; then
                    gh release upload "$TAG" "$ASSET" --clobber
                    gh release edit "$TAG" \
                      --target "$GITHUB_SHA" \
                      --title "$TITLE" \
                      --notes-file /tmp/release-notes.md \
                      --latest
                  else
                    gh release create "$TAG" "$ASSET" \
                      --target "$GITHUB_SHA" \
                      --latest \
                      --title "$TITLE" \
                      --notes-file /tmp/release-notes.md
                  fi
