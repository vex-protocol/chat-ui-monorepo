name: Mobile — Release

# Builds the production APK and creates a GitHub Release when the release-
# mobile PR (maintained by release-pr-mobile.yml) is merged to master.
# Trigger is a version change in apps/mobile/package.json on master — the
# merged PR's body is extracted and used as the release notes.
#
# Builds via `eas build --local` on ubuntu-latest (with setup-java + Android
# SDK installed at job time) so we dodge EAS cloud free-tier quotas entirely.
# EXPO_TOKEN is still required for keystore credential fetch and for
# appVersionSource:remote to reach EAS's versionCode store.
#
# The release APK has updates.enabled:false baked into app.config.js, so
# it never contacts any update server. Installing it is a one-time,
# pinned binary.
#
# Concurrency: cancel-in-progress:false — matches Bluesky's pattern.
# Canceling a build mid-flight can corrupt the remote versionCode state
# held in EAS, so queued builds always run to completion.
#
# Secrets: EXPO_TOKEN, GITHUB_TOKEN (automatic).

on:
    push:
        branches: [master]
        paths:
            - "apps/mobile/package.json"

concurrency:
    group: release-mobile
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 2

            - name: Detect version change
              id: version
              run: |
                  NEW=$(node -pe "require('./apps/mobile/package.json').version")
                  git show HEAD~1:apps/mobile/package.json > /tmp/old-package.json 2>/dev/null || echo '{"version":""}' > /tmp/old-package.json
                  OLD=$(node -pe "require('/tmp/old-package.json').version || ''")
                  if [ "$OLD" = "$NEW" ]; then
                    echo "No version change ($OLD → $NEW), skipping release"
                    echo "skip=true" >> $GITHUB_OUTPUT
                  else
                    echo "Version change: $OLD → $NEW"
                    echo "version=$NEW" >> $GITHUB_OUTPUT
                    echo "skip=false" >> $GITHUB_OUTPUT
                  fi

            - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
              if: steps.version.outputs.skip == 'false'

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              if: steps.version.outputs.skip == 'false'
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            # TODO: pin setup-java + setup-android to SHA once scorecard flags
            # them. Tag refs for now because I don't have the pins handy.
            - name: Setup Java (Temurin 17)
              if: steps.version.outputs.skip == 'false'
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Setup Android SDK
              if: steps.version.outputs.skip == 'false'
              uses: android-actions/setup-android@v4
              with:
                  cmdline-tools-version: "13114758"

            - name: Install dependencies
              if: steps.version.outputs.skip == 'false'
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Install EAS CLI + local build plugin
              if: steps.version.outputs.skip == 'false'
              run: npm install -g eas-cli@latest eas-cli-local-build-plugin@latest

            - name: Build production APK (local)
              if: steps.version.outputs.skip == 'false'
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
              run: |
                  eas build \
                    --profile production \
                    --platform android \
                    --local \
                    --non-interactive \
                    --output "${{ github.workspace }}/release.apk"

            - name: Extract release notes from release PR body
              if: steps.version.outputs.skip == 'false'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  PR=$(gh pr list \
                    --search "${{ github.sha }}" \
                    --state merged \
                    --limit 1 \
                    --json number \
                    -q '.[0].number // empty')

                  if [ -n "$PR" ]; then
                    echo "Found merged PR #$PR"
                    gh pr view "$PR" --json body -q .body > /tmp/release-notes.md
                  else
                    echo "No PR found for ${{ github.sha }} — using git log as fallback"
                    PREV_TAG=$(git describe --tags --match='mobile-v*' --abbrev=0 HEAD~1 2>/dev/null || echo '')
                    {
                      echo "## What's new"
                      echo ""
                      if [ -n "$PREV_TAG" ]; then
                        git log "$PREV_TAG"..HEAD --format='- %s'
                      else
                        git log --format='- %s' -20
                      fi
                    } > /tmp/release-notes.md
                  fi

                  echo "--- release notes ---"
                  cat /tmp/release-notes.md

            - name: Create GitHub Release
              if: steps.version.outputs.skip == 'false'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "mobile-v${{ steps.version.outputs.version }}" \
                    release.apk \
                    --latest \
                    --title "Mobile ${{ steps.version.outputs.version }}" \
                    --notes-file /tmp/release-notes.md
