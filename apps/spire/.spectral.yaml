extends:
  - spectral:oas

rules:
  # These rules add noise without adding value for internal APIs
  info-contact: off
  operation-description: warn
  oas3-parameter-description: warn
  tag-description: warn

  # Block any x-internal endpoints from appearing in the public spec
  no-x-internal-paths:
    description: x-internal endpoints must not appear in the public spec
    severity: error
    given: '$.paths.*'
    then:
      field: x-internal
      function: falsy
